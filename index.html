    <style>
      :root {
        --chat--color-primary: linear-gradient(135deg, #0163F5, #4d8ef7);
        --chat--color-primary-shade-50: linear-gradient(135deg, #0159dd, #4580f0);
        --chat--color-primary-shade-100: linear-gradient(135deg, #014fc4, #3d72e9);
        --chat--color-secondary: linear-gradient(135deg, #0163F5, #4d8ef7);
        --chat--color-white: #ffffff;
        --chat--color-dark: #2C2C2C;
        --chat--color-light: #f8fafc;
        --chat--font: 'Inter', sans-serif;

        --chat--toggle--background: linear-gradient(135deg, #0163F5, #4d8ef7);
        --chat--toggle--hover--background: linear-gradient(135deg, #0159dd, #4580f0);
        --chat--toggle--active--background: linear-gradient(135deg, #014fc4, #3d72e9);
        --chat--toggle--color: var(--chat--color-white);
        --chat--toggle--shadow: 0 8px 32px rgba(1, 99, 245, 0.3);
        --chat--toggle--hover--shadow: 0 12px 40px rgba(1, 99, 245, 0.4);

        --chat--header--background: linear-gradient(135deg, #0163F5, #4d8ef7);
        --chat--header--color: var(--chat--color-white);
        --chat--message--bot--background: #ffffff;
        --chat--message--bot--color: var(--chat--color-dark);
        --chat--message--user--background: linear-gradient(135deg, #0163F5, #4d8ef7);
        --chat--message--user--color: var(--chat--color-white);
        --chat--message--shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        --chat--input--shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        --chat--border-radius: 16px;
        --chat--border-radius-large: 24px;

        --chat--font-family: 'Inter', sans-serif;
      }

      /* Stili personalizzati per il chatbot fluttuante */
      .n8n-chat {
        font-family: 'Inter', sans-serif !important;
      }

      /* Pulsante toggle moderno */
      .n8n-chat-toggle {
        background: var(--chat--toggle--background) !important;
        border-radius: var(--chat--border-radius) !important;
        box-shadow: var(--chat--toggle--shadow) !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        backdrop-filter: blur(10px) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
      }

      .n8n-chat-toggle:hover {
        background: var(--chat--toggle--hover--background) !important;
        box-shadow: var(--chat--toggle--hover--shadow) !important;
        transform: scale(1.05) !important;
      }

      .n8n-chat-toggle:active {
        background: var(--chat--toggle--active--background) !important;
        transform: scale(0.95) !important;
      }

      /* Header moderno */
      .n8n-chat-header {
        background: var(--chat--header--background) !important;
        border-radius: var(--chat--border-radius) var(--chat--border-radius) 0 0 !important;
        backdrop-filter: blur(10px) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        padding: 20px !important;
      }

      /* Container principale */
      .n8n-chat-container {
        border-radius: var(--chat--border-radius-large) !important;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15) !important;
        backdrop-filter: blur(20px) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        overflow: hidden !important;
      }

      /* Messaggi bot */
      .n8n-chat-message.bot {
        background: #ffffff !important;
        border-radius: var(--chat--border-radius) !important;
        box-shadow: var(--chat--message--shadow) !important;
        border: 1px solid rgba(0, 0, 0, 0.1) !important;
        margin: 8px 0 !important;
        padding: 16px !important;
        color: #2C2C2C !important;
      }

      /* Messaggi utente */
      .n8n-chat-message.user {
        background: #0163F5 !important;
        border-radius: var(--chat--border-radius) !important;
        box-shadow: var(--chat--message--shadow) !important;
        margin: 8px 0 !important;
        padding: 16px !important;
        color: #ffffff !important;
        font-weight: 500 !important;
      }

      /* Forza il colore del testo nei messaggi utente */
      .n8n-chat-message.user * {
        color: #ffffff !important;
      }

      /* Selettori più specifici per i messaggi utente */
      .n8n-chat .n8n-chat-message.user,
      .n8n-chat-container .n8n-chat-message.user,
      [class*="user"] {
        background: #0163F5 !important;
        color: #ffffff !important;
      }

      /* Forza il colore su tutti gli elementi figli dei messaggi utente */
      .n8n-chat-message.user p,
      .n8n-chat-message.user span,
      .n8n-chat-message.user div,
      .n8n-chat-message.user text {
        color: #ffffff !important;
        background: transparent !important;
      }

      /* Override per messaggi con classi specifiche */
      .n8n-chat-messages .user,
      .n8n-chat-messages [data-type="user"],
      .n8n-chat-messages [role="user"] {
        background: #0163F5 !important;
        color: #ffffff !important;
      }

      /* Stili per il contenuto del messaggio utente */
      .n8n-chat-message.user .message-content,
      .n8n-chat-message.user .text,
      .n8n-chat-message.user .content {
        color: #ffffff !important;
        background: transparent !important;
      }

      /* Area input */
      .n8n-chat-input-container {
        background: #ffffff !important;
        backdrop-filter: blur(10px) !important;
        border-top: 1px solid rgba(0, 0, 0, 0.1) !important;
        padding: 20px !important;
      }

      .n8n-chat-input {
        border-radius: var(--chat--border-radius) !important;
        box-shadow: var(--chat--input--shadow) !important;
        border: 2px solid #E6E6E6 !important;
        padding: 12px 16px !important;
        font-family: 'Inter', sans-serif !important;
        transition: all 0.3s ease !important;
        background: #ffffff !important;
        color: #2C2C2C !important;
      }

      .n8n-chat-input:focus {
        box-shadow: 0 0 0 3px rgba(1, 99, 245, 0.2), var(--chat--input--shadow) !important;
        border-color: #0163F5 !important;
        outline: none !important;
      }

      /* Pulsante invio */
      .n8n-chat-send-button {
        background: #0163F5 !important;
        border-radius: var(--chat--border-radius) !important;
        box-shadow: var(--chat--message--shadow) !important;
        transition: all 0.3s ease !important;
        padding: 12px !important;
        margin-left: 12px !important;
        color: #ffffff !important;
      }

      .n8n-chat-send-button:hover {
        background: #0159dd !important;
        transform: scale(1.05) !important;
        box-shadow: var(--chat--toggle--hover--shadow) !important;
      }

      /* Forza il colore della freccia nel pulsante invio */
      .n8n-chat-send-button svg,
      .n8n-chat-send-button path,
      .n8n-chat-send-button * {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
      }

      /* Stili specifici per l'icona di invio */
      .n8n-chat-send-button [data-icon="send"],
      .n8n-chat-send-button [class*="send"],
      .n8n-chat-send-button [class*="arrow"] {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
      }

      /* Forza il colore in tutti gli stati del pulsante */
      .n8n-chat-send-button:hover svg,
      .n8n-chat-send-button:focus svg,
      .n8n-chat-send-button:active svg,
      .n8n-chat-send-button:disabled svg {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
      }

      /* Selettori ancora più specifici per tutti gli elementi SVG */
      .n8n-chat-send-button svg *,
      .n8n-chat-send-button path,
      .n8n-chat-send-button polygon,
      .n8n-chat-send-button line,
      .n8n-chat-send-button circle {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
      }

      /* Override per stati dinamici */
      .n8n-chat-input-container .n8n-chat-send-button svg,
      .n8n-chat-input-container .n8n-chat-send-button svg *,
      .n8n-chat-input-container .n8n-chat-send-button path {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
        opacity: 1 !important;
      }

      /* Forza il colore quando l'input ha contenuto */
      .n8n-chat-input:not(:placeholder-shown) ~ .n8n-chat-send-button svg,
      .n8n-chat-input:not(:placeholder-shown) ~ .n8n-chat-send-button svg *,
      .n8n-chat-input:not(:placeholder-shown) ~ .n8n-chat-send-button path {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
      }

      /* Stili specifici per il pulsante di invio - forza sempre il colore blu */
      .n8n-chat-send-button,
      button[type="submit"],
      .n8n-chat .send-button,
      .n8n-chat-input-container button {
        background: #0163F5 !important;
        border: none !important;
        color: #ffffff !important;
      }

      /* Forza il pulsante blu anche quando l'input è attivo */
      .n8n-chat-input:focus ~ .n8n-chat-send-button,
      .n8n-chat-input:not(:placeholder-shown) ~ .n8n-chat-send-button,
      .n8n-chat-input-container .n8n-chat-send-button {
        background: #0163F5 !important;
        color: #ffffff !important;
        border: none !important;
      }

      /* Hover del pulsante di invio */
      .n8n-chat-send-button:hover,
      .n8n-chat-input-container button:hover {
        background: #0159dd !important;
        color: #ffffff !important;
      }

      /* Forza tutti gli elementi interni del pulsante */
      .n8n-chat-send-button *,
      .n8n-chat-input-container button * {
        color: #ffffff !important;
        fill: #ffffff !important;
        stroke: #ffffff !important;
      }

      /* STILI AGGRESSIVI PER IL PULSANTE DI INVIO */
      /* Forza il pulsante blu con priorità massima */
      div[class*="chat"] button[type="submit"],
      div[class*="chat"] button:last-child,
      div[class*="input"] button,
      [class*="n8n"] button[class*="send"],
      [class*="chat"] [class*="send"],
      .n8n-chat button:not([class*="toggle"]) {
        background: linear-gradient(135deg, #0163F5, #4d8ef7) !important;
        border: none !important;
        color: white !important;
        border-radius: 16px !important;
        padding: 12px !important;
        box-shadow: 0 8px 32px rgba(1, 99, 245, 0.3) !important;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        backdrop-filter: blur(10px) !important;
        position: relative !important;
        overflow: hidden !important;
      }

      /* Hover moderno con effetti avanzati */
      div[class*="chat"] button[type="submit"]:hover,
      div[class*="chat"] button:last-child:hover,
      div[class*="input"] button:hover,
      [class*="n8n"] button[class*="send"]:hover,
      [class*="chat"] [class*="send"]:hover,
      .n8n-chat button:not([class*="toggle"]):hover {
        background: linear-gradient(135deg, #0159dd, #4580f0) !important;
        transform: scale(1.05) translateY(-2px) !important;
        box-shadow: 0 12px 40px rgba(1, 99, 245, 0.4) !important;
      }

      /* Effetto click moderno */
      div[class*="chat"] button[type="submit"]:active,
      div[class*="chat"] button:last-child:active,
      div[class*="input"] button:active,
      [class*="n8n"] button[class*="send"]:active,
      [class*="chat"] [class*="send"]:active,
      .n8n-chat button:not([class*="toggle"]):active {
        transform: scale(0.95) !important;
        box-shadow: 0 4px 16px rgba(1, 99, 245, 0.5) !important;
      }

      /* Effetto shimmer moderno */
      div[class*="chat"] button[type="submit"]::before,
      div[class*="chat"] button:last-child::before,
      div[class*="input"] button::before,
      [class*="n8n"] button[class*="send"]::before,
      [class*="chat"] [class*="send"]::before,
      .n8n-chat button:not([class*="toggle"])::before {
        content: '' !important;
        position: absolute !important;
        top: 0 !important;
        left: -100% !important;
        width: 100% !important;
        height: 100% !important;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent) !important;
        transition: left 0.6s ease !important;
      }

      /* Attiva shimmer al hover */
      div[class*="chat"] button[type="submit"]:hover::before,
      div[class*="chat"] button:last-child:hover::before,
      div[class*="input"] button:hover::before,
      [class*="n8n"] button[class*="send"]:hover::before,
      [class*="chat"] [class*="send"]:hover::before,
      .n8n-chat button:not([class*="toggle"]):hover::before {
        left: 100% !important;
      }

      /* Forza tutti gli SVG e icone nel pulsante */
      div[class*="chat"] button svg,
      div[class*="chat"] button svg *,
      div[class*="input"] button svg,
      div[class*="input"] button svg *,
      [class*="n8n"] button svg,
      [class*="n8n"] button svg * {
        color: white !important;
        fill: white !important;
        stroke: white !important;
        opacity: 1 !important;
        transition: all 0.3s ease !important;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)) !important;
      }

      /* Icona più grande e moderna */
      div[class*="chat"] button svg,
      div[class*="input"] button svg,
      [class*="n8n"] button svg {
        width: 20px !important;
        height: 20px !important;
        transform: rotate(-45deg) !important;
      }

      /* Animazione icona al hover */
      div[class*="chat"] button:hover svg,
      div[class*="input"] button:hover svg,
      [class*="n8n"] button:hover svg {
        transform: rotate(-45deg) scale(1.1) !important;
      }

      /* Stili per quando si scrive nell'input */
      input:not(:placeholder-shown) + button,
      input:not(:placeholder-shown) ~ button,
      textarea:not(:placeholder-shown) + button,
      textarea:not(:placeholder-shown) ~ button,
      [class*="input"]:has(input:not(:placeholder-shown)) button,
      [class*="input"]:has(textarea:not(:placeholder-shown)) button {
        background: linear-gradient(135deg, #0163F5, #4d8ef7) !important;
        color: white !important;
        animation: pulseGlow 2s ease-in-out infinite !important;
      }

      /* Animazione pulse quando si scrive */
      @keyframes pulseGlow {
        0%, 100% {
          box-shadow: 0 8px 32px rgba(1, 99, 245, 0.3) !important;
        }
        50% {
          box-shadow: 0 12px 40px rgba(1, 99, 245, 0.5) !important;
        }
      }

      /* Forza anche con selettori universali */
      * [class*="chat"] button:not([class*="toggle"]):not([class*="close"]) {
        background: linear-gradient(135deg, #0163F5, #4d8ef7) !important;
        color: white !important;
      }

      * [class*="chat"] button:not([class*="toggle"]):not([class*="close"]) * {
        color: white !important;
        fill: white !important;
        stroke: white !important;
      }

      /* Area messaggi */
      .n8n-chat-messages {
        background: #f8fafc !important;
        padding: 20px !important;
      }

      /* Scrollbar personalizzata */
      .n8n-chat-messages::-webkit-scrollbar {
        width: 6px !important;
      }

      .n8n-chat-messages::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.05) !important;
        border-radius: 3px !important;
      }

      .n8n-chat-messages::-webkit-scrollbar-thumb {
        background: rgba(1, 99, 245, 0.3) !important;
        border-radius: 3px !important;
      }

      .n8n-chat-messages::-webkit-scrollbar-thumb:hover {
        background: rgba(1, 99, 245, 0.5) !important;
      }

      /* Animazioni */
      .n8n-chat-message {
        animation: slideInMessage 0.3s ease-out !important;
      }

      @keyframes slideInMessage {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Indicatore di digitazione */
      .n8n-chat-typing {
        background: #ffffff !important;
        border-radius: var(--chat--border-radius) !important;
        box-shadow: var(--chat--message--shadow) !important;
        border: 1px solid rgba(0, 0, 0, 0.1) !important;
        padding: 16px !important;
        color: #2C2C2C !important;
      }

      /* Rimuovi branding */
      .n8n-chat-footer,
      .n8n-chat-powered-by {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      window.addEventListener('load', () => {
        const getLanguage = () => localStorage.getItem('preferred-language') || 'it';

        const initChat = () => {
          const lang = getLanguage();
          const isEnglish = lang === 'en';

          import('https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js')
            .then(({ createChat }) => {
              createChat({
                webhookUrl: 'https://bao02.app.n8n.cloud/webhook/7fd8d68c-ee8d-4c54-a79b-4a37037fcdd5/chat',
                mode: 'window',
                defaultLanguage: lang,
                showWelcomeScreen: false,
                initialMessages: isEnglish
                  ? ["Hello!", "I'm the Agentics AI Assistant. How can I help you today?"]
                  : ["Ciao!", "Sono l'Assistente AI di Agentics. Come posso aiutarti oggi?"],
                i18n: {
                  [lang]: {
                    title: isEnglish ? 'Agentics AI Assistant' : 'Assistente AI Agentics',
                    subtitle: isEnglish ? 'Empowering Businesses with Intelligent Automation' : 'Potenziamo le Aziende con Automazione Intelligente',
                    inputPlaceholder: isEnglish ? 'Write your question...' : 'Scrivi la tua domanda...',
                    getStarted: isEnglish ? 'New Conversation' : 'Nuova Conversazione',
                    footer: ''
                  }
                }
              });
            })
            .catch(console.error);
        };

        initChat();

        window.addEventListener('languageChange', () => {
          location.reload();
        });
      });
    </script>
  </body>
</html>
